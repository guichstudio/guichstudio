<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hero Fan Cards — BuildLore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #fff;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      .nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 48px;
        font-weight: 700;
        font-size: 18px;
      }
      .nav a { text-decoration: none; color: #000; }

      .hero {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 80vh;
        padding: 40px 20px;
        overflow: hidden;
      }

      .hero h1 {
        position: relative;
        z-index: 10;
        font-weight: 900;
        font-size: clamp(3rem, 7.5vw, 7.5rem);
        letter-spacing: -0.045em;
        line-height: 0.95;
        text-align: center;
        color: #000;
      }
      .hero .sub {
        position: relative;
        z-index: 10;
        margin-top: 24px;
        font-size: 16px;
        font-weight: 400;
        color: #555;
        text-align: center;
        letter-spacing: -0.01em;
      }

      /* Fan containers — pinned to viewport edges */
      .fan {
        position: absolute;
        top: 50%;
        transform: translateY(-55%);
        perspective: 1200px;
      }
      .fan.left { left: -60px; }
      .fan.right { right: -60px; }

      .fan .card {
        position: absolute;
        border-radius: 6px;
        overflow: hidden;
        cursor: pointer;
        transform-style: preserve-3d;
        transition: box-shadow 0.3s, filter 0.3s;
      }
      .fan .card:hover {
        box-shadow: 0 25px 70px rgba(0,0,0,0.3) !important;
        filter: brightness(1.05);
      }
      .fan .card video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        pointer-events: none;
      }

      @media (max-width: 1024px) {
        .fan { display: none; }
      }
    </style>
  </head>
  <body>
    <nav class="nav">
      <span>BuildLore</span>
      <a href="#">Work</a>
    </nav>

    <section class="hero">
      <div class="fan left" id="fan-left"></div>
      <div class="fan right" id="fan-right"></div>
      <h1>Retain attention.<br>Build brand.</h1>
      <p class="sub">Narrative-led branding, video production, and content for tech & Web3.</p>
    </section>

    <script>
      // 10 videos from CloudFront — 5 per side
      const VIDEOS = [
        'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/fantasy-1.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/H-company-1.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/projection/pressiat.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/eterna.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/H-company-2.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/fantasy-2.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/domestique-1.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/domestique-2.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/pump-fun.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/fantasy-3.mp4',
      ];

      // Card config — index 0 = closest to center (biggest, lightest), 4 = edge (smallest, darkest)
      // Matching the ref: cards fan OUT from center, perspective vanishing point at center.
      // Closest card is tall & wide, outer cards are narrower, more rotated, darker overlay.
      function buildFan(container, side, videoSlice) {
        const flip = side === 'right' ? -1 : 1;
        const count = videoSlice.length;

        for (let i = 0; i < count; i++) {
          const t = i / (count - 1 || 1); // 0 → 1

          // Dimensions: closest card is largest
          const w = 300 - t * 120;   // 300 → 180
          const h = 420 - t * 120;   // 420 → 300

          // Position: spread outward from center
          const tx = 80 + i * 100;      // horizontal offset from fan anchor
          const tz = -i * 60;           // push back in Z
          const ry = 8 + t * 55;        // rotateY: 8° → 63°
          const sc = 1 - t * 0.05;      // slight scale reduction

          // Darkness overlay increases toward edges
          const overlayOpacity = t * 0.55;

          const card = document.createElement('div');
          card.className = 'card';
          card.style.width = w + 'px';
          card.style.height = h + 'px';
          card.style.transform =
            'translateX(' + (flip * -tx) + 'px) ' +
            'translateZ(' + tz + 'px) ' +
            'rotateY(' + (flip * ry) + 'deg) ' +
            'scale(' + sc + ')';
          card.style.zIndex = count - i;
          card.style.boxShadow = '0 10px 40px rgba(0,0,0,' + (0.1 + t * 0.15) + ')';

          // Video element (autoplay muted loop)
          const video = document.createElement('video');
          video.src = videoSlice[i];
          video.muted = true;
          video.loop = true;
          video.playsInline = true;
          video.autoplay = true;
          video.setAttribute('playsinline', '');
          card.appendChild(video);

          // Dark overlay for depth effect
          if (overlayOpacity > 0.01) {
            const overlay = document.createElement('div');
            overlay.style.cssText =
              'position:absolute;inset:0;background:rgba(0,0,0,' +
              overlayOpacity +
              ');pointer-events:none;border-radius:6px;';
            card.appendChild(overlay);
          }

          // Stagger entrance
          card.style.opacity = '0';
          setTimeout(function () {
            card.style.transition = 'opacity 0.7s ease';
            card.style.opacity = '1';
          }, 300 + i * 120);

          container.appendChild(card);
        }
      }

      const leftVideos = VIDEOS.slice(0, 5);
      const rightVideos = VIDEOS.slice(5, 10);
      buildFan(document.getElementById('fan-left'), 'left', leftVideos);
      buildFan(document.getElementById('fan-right'), 'right', rightVideos);
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Hero Fan — BuildLore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800;900&display=swap" media="print" onload="this.media='all'"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{font-family:'Inter',system-ui,sans-serif;background:#fff;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
    .nav{display:flex;justify-content:space-between;padding:20px 48px;font-weight:700;font-size:18px}
    .nav a{text-decoration:none;color:#000}

    .hero{
      position:relative;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      min-height:82vh;
      padding:40px 20px;
      overflow:hidden;
      /* THE KEY: perspective centered on the heading text = vanishing point */
      perspective:1200px;
      perspective-origin:50% 45%;
    }
    .hero h1{
      position:relative;z-index:30;
      font-weight:900;
      font-size:clamp(3rem,7.5vw,7.5rem);
      letter-spacing:-0.045em;line-height:0.95;
      text-align:center;color:#000;
    }
    .hero .sub{
      position:relative;z-index:30;
      margin-top:24px;font-size:16px;font-weight:400;
      color:#555;text-align:center;
    }

    .card{
      position:absolute;
      width:380px;height:270px;
      border-radius:6px;
      overflow:hidden;cursor:pointer;
      transition:filter .3s;
      backface-visibility:hidden;
    }
    .card:hover{filter:brightness(1.12)}
    .card video{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}

    /* White fade overlays on inner edges so cards blend to white near text */
    .fade-left,.fade-right{
      position:absolute;top:0;bottom:0;
      width:45%;z-index:25;pointer-events:none;
    }
    .fade-left{left:0;background:linear-gradient(to left,rgba(255,255,255,.95) 0%,transparent 65%)}
    .fade-right{right:0;background:linear-gradient(to right,rgba(255,255,255,.95) 0%,transparent 65%)}

    @media(max-width:900px){.card,.fade-left,.fade-right{display:none}}
  </style>
</head>
<body>
  <nav class="nav"><span>BuildLore</span><a href="#">Work</a></nav>
  <section class="hero" id="hero">
    <!-- White fades near the text -->
    <div class="fade-left"></div>
    <div class="fade-right"></div>

    <h1>Retain attention.<br>Build brand.</h1>
    <p class="sub">Narrative-led branding, video production, and content for tech & Web3.</p>
  </section>

  <script>
    var V=[
      'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/fantasy-1.mp4',
      'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/H-company-1.mp4',
      'https://d8clex4mautkm.cloudfront.net/video-landing/projection/pressiat.mp4',
      'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/eterna.mp4',
      'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/H-company-2.mp4',
      'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/fantasy-2.mp4',
      'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/domestique-1.mp4',
      'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/domestique-2.mp4',
      'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/pump-fun.mp4',
      'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/fantasy-3.mp4',
    ];

    var hero = document.getElementById('hero');
    var vw = window.innerWidth;
    var heroH = hero.offsetHeight;
    var centerY = heroH * 0.45; // match perspective-origin Y

    // LEFT cards: positioned left of center, rotateY positive (face right toward center)
    // transform-origin: right center so the right edge (inner) is the pivot
    // Card 0 = outermost (most rotated, at viewport left edge)
    // Card 4 = innermost (least rotated, closest to text)
    var leftConf = [
      { x: -180, ry: 78, z: 1 },
      { x: -90,  ry: 68, z: 2 },
      { x: 10,   ry: 55, z: 3 },
      { x: 110,  ry: 40, z: 4 },
      { x: 220,  ry: 22, z: 5 },
    ];

    // RIGHT cards: mirror — rotateY negative, transform-origin: left center
    var rightConf = [
      { x: vw - 200, ry: -78, z: 1 },
      { x: vw - 290, ry: -68, z: 2 },
      { x: vw - 390, ry: -55, z: 3 },
      { x: vw - 490, ry: -40, z: 4 },
      { x: vw - 600, ry: -22, z: 5 },
    ];

    function makeCard(src, x, ry, z, originSide, delay) {
      var c = document.createElement('div');
      c.className = 'card';
      c.style.left = x + 'px';
      c.style.top = (centerY - 135) + 'px'; // vertically centered on vanishing point
      c.style.transform = 'rotateY(' + ry + 'deg)';
      c.style.transformOrigin = originSide + ' center';
      c.style.zIndex = z;

      var v = document.createElement('video');
      v.src = src; v.muted = true; v.loop = true; v.playsInline = true; v.autoplay = true;
      v.setAttribute('playsinline','');
      c.appendChild(v);

      c.style.opacity = '0';
      setTimeout(function(){ c.style.transition='opacity .5s'; c.style.opacity='1'; }, delay);

      hero.appendChild(c);
    }

    // Build left fan
    for (var i = 0; i < 5; i++) {
      var lc = leftConf[i];
      makeCard(V[i], lc.x, lc.ry, lc.z, 'right', 100 + i * 80);
    }
    // Build right fan
    for (var i = 0; i < 5; i++) {
      var rc = rightConf[i];
      makeCard(V[5+i], rc.x, rc.ry, rc.z, 'left', 100 + i * 80);
    }
  </script>
</body>
</html>

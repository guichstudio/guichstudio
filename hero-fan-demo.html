<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hero Fan — BuildLore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800;900&display=swap" media="print" onload="this.media='all'" />
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      html,body{font-family:'Inter',system-ui,sans-serif;background:#fff;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
      .nav{display:flex;justify-content:space-between;padding:20px 48px;font-weight:700;font-size:18px}
      .nav a{text-decoration:none;color:#000}

      .hero{
        position:relative;
        display:flex;flex-direction:column;
        align-items:center;justify-content:center;
        min-height:85vh;
        padding:40px 20px;
      }
      .hero h1{
        position:relative;z-index:20;
        font-weight:900;
        font-size:clamp(3rem,7.5vw,7.5rem);
        letter-spacing:-0.045em;line-height:0.95;
        text-align:center;color:#000;
      }
      .hero .sub{
        position:relative;z-index:20;
        margin-top:24px;font-size:16px;font-weight:400;
        color:#555;text-align:center;
      }

      /* Fan wrapper — perspective corridor converging toward the text */
      .fan-wrap{
        position:absolute;
        top:50%;
        transform:translateY(-50%);
        pointer-events:none;
      }
      .fan-wrap.left{
        left:0;
        /* Vanishing point at the right edge (toward text) */
        perspective:700px;
        perspective-origin:100% 50%;
        /* Blend: fade at outer edge + fade toward text */
        -webkit-mask-image:linear-gradient(to right,transparent 0%,black 8%,black 50%,transparent 100%);
        mask-image:linear-gradient(to right,transparent 0%,black 8%,black 50%,transparent 100%);
      }
      .fan-wrap.right{
        right:0;
        perspective:700px;
        perspective-origin:0% 50%;
        -webkit-mask-image:linear-gradient(to left,transparent 0%,black 8%,black 50%,transparent 100%);
        mask-image:linear-gradient(to left,transparent 0%,black 8%,black 50%,transparent 100%);
      }

      .card{
        position:absolute;
        overflow:hidden;
        cursor:pointer;
        pointer-events:auto;
        transform-style:preserve-3d;
        transition:filter .3s;
      }
      .card:hover{filter:brightness(1.1)}
      .card video{
        width:100%;height:100%;
        object-fit:cover;display:block;
        pointer-events:none;
      }

      @media(max-width:1024px){.fan-wrap{display:none}}
    </style>
  </head>
  <body>
    <nav class="nav"><span>BuildLore</span><a href="#">Work</a></nav>
    <section class="hero" id="hero">
      <div class="fan-wrap left" id="fan-left"></div>
      <div class="fan-wrap right" id="fan-right"></div>
      <h1>Retain attention.<br>Build brand.</h1>
      <p class="sub">Narrative-led branding, video production, and content for tech & Web3.</p>
    </section>

    <script>
      var VIDEOS=[
        'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/fantasy-1.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/H-company-1.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/projection/pressiat.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/eterna.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/H-company-2.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/fantasy-2.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/domestique-1.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/domestique-2.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/pump-fun.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/fantasy-3.mp4',
      ];

      var vw = window.innerWidth;
      // Fan wrapper width: ~42% of viewport
      var fanW = Math.round(vw * 0.42);
      document.getElementById('fan-left').style.width = fanW + 'px';
      document.getElementById('fan-right').style.width = fanW + 'px';
      document.getElementById('fan-left').style.height = '480px';
      document.getElementById('fan-right').style.height = '480px';

      function buildFan(container, side, videos) {
        var count = videos.length;

        // All cards same 3D size (tall portrait like the ref)
        var cardW = 170;
        var cardH = 380;

        // Cards packed tightly from the outer edge toward center.
        // Card 0 = at the outer edge (closest to camera, biggest visually)
        // Card 4 = near center (farthest from camera, smallest visually)
        // The container's perspective makes further cards (higher translateZ magnitude)
        // appear smaller — creating the corridor/tunnel convergence effect.

        var gap = 18; // tight horizontal gap between cards

        for (var i = 0; i < count; i++) {
          var t = i / (count - 1 || 1); // 0 = edge, 1 = center

          // Horizontal position: card 0 at outer edge, card 4 near inner edge
          var x;
          if (side === 'left') {
            x = i * (cardW * 0.28 + gap); // tight overlap
          } else {
            x = fanW - cardW - i * (cardW * 0.28 + gap);
          }

          // Z depth: card 0 at z=0 (camera), card 4 pushed deep into screen
          var z = -i * 120;

          // Vertical center
          var y = (480 - cardH) / 2;

          // Shading: edge (i=0) = darkest, center (i=4) = lightest
          var shade = Math.round(60 + t * 160); // rgb 60 → 220

          var card = document.createElement('div');
          card.className = 'card';
          card.style.width = cardW + 'px';
          card.style.height = cardH + 'px';
          card.style.left = x + 'px';
          card.style.top = y + 'px';
          card.style.transform = 'translateZ(' + z + 'px)';
          card.style.zIndex = count - i;
          card.style.background = 'rgb(' + shade + ',' + shade + ',' + shade + ')';

          var vid = document.createElement('video');
          vid.src = videos[i];
          vid.muted = true; vid.loop = true; vid.playsInline = true; vid.autoplay = true;
          vid.setAttribute('playsinline', '');
          vid.style.opacity = '0';
          vid.addEventListener('loadeddata', function() { this.style.opacity = '1'; this.style.transition = 'opacity .5s'; });
          card.appendChild(vid);

          card.style.opacity = '0';
          (function(c, d) {
            setTimeout(function() {
              c.style.transition = 'opacity .5s ease';
              c.style.opacity = '1';
            }, d);
          })(card, 150 + i * 80);

          container.appendChild(card);
        }
      }

      buildFan(document.getElementById('fan-left'), 'left', VIDEOS.slice(0, 5));
      buildFan(document.getElementById('fan-right'), 'right', VIDEOS.slice(5, 10));
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Hero Fan — BuildLore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800;900&display=swap" media="print" onload="this.media='all'"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0 }
    html, body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #fff;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ---- Nav ---- */
    .nav {
      display: flex;
      justify-content: space-between;
      padding: 20px 48px;
      font-weight: 700;
      font-size: 18px;
    }
    .nav a { text-decoration: none; color: #000 }

    /* ---- Hero ---- */
    .hero {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 82vh;
      padding: 40px 20px;
      /* Perspective vanishing point = center of heading */
      perspective: 1400px;
      perspective-origin: 50% 46%;
    }
    .hero h1 {
      position: relative;
      z-index: 30;
      font-weight: 900;
      font-size: clamp(3rem, 7.5vw, 7.5rem);
      letter-spacing: -0.045em;
      line-height: 0.95;
      text-align: center;
      color: #000;
    }
    .hero .sub {
      position: relative;
      z-index: 30;
      margin-top: 24px;
      font-size: 16px;
      font-weight: 400;
      color: #555;
      text-align: center;
    }

    /* ---- Card ---- */
    .card {
      position: absolute;
      width: 360px;
      height: 260px;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      backface-visibility: hidden;
      transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    /* ---- White gradient fades near the text ---- */
    .fade {
      position: absolute;
      top: 0; bottom: 0;
      width: 42%;
      z-index: 25;
      pointer-events: none;
    }
    .fade-l {
      left: 12%;
      background: linear-gradient(to left, rgba(255,255,255,1) 10%, rgba(255,255,255,0.9) 40%, transparent 100%);
    }
    .fade-r {
      right: 12%;
      background: linear-gradient(to right, rgba(255,255,255,1) 10%, rgba(255,255,255,0.9) 40%, transparent 100%);
    }

    @media (max-width: 1024px) {
      .card, .fade { display: none }
    }
  </style>
</head>
<body>
  <nav class="nav"><span>BuildLore</span><a href="#">Work</a></nav>

  <section class="hero" id="hero" role="banner">
    <div class="fade fade-l"></div>
    <div class="fade fade-r"></div>
    <h1>Retain attention.<br>Build brand.</h1>
    <p class="sub">Narrative-led branding, video production, and content for tech &amp; Web3.</p>
  </section>

  <script>
    // ---- Video sources (CloudFront) ----
    // Left side: 0-4, Right side: 5-9
    const VIDEOS = [
      { src: 'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/fantasy-1.mp4',             poster: 'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/fantasy-1-thumbnail.webp',     label: 'Fantasy Top — Brand film' },
      { src: 'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/H-company-1.mp4',      poster: 'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/H-company-1-thumbnail.webp', label: 'H Company — Commercial' },
      { src: 'https://d8clex4mautkm.cloudfront.net/video-landing/projection/pressiat.mp4',         poster: 'https://d8clex4mautkm.cloudfront.net/video-landing/projection/pressiat-thumbnail.webp', label: 'Pressiat — Projection mapping' },
      { src: 'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/eterna.mp4',                poster: 'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/eterna-thumbnail.webp',        label: 'Eterna Labs — Web3' },
      { src: 'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/H-company-2.mp4',      poster: 'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/H-company-2-thumbnail.webp', label: 'H Company — Brand' },
      { src: 'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/pressiat-1.mp4',       poster: 'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/pressiat-2-thumbnail.webp', label: 'Pressiat — Commercial' },
      { src: 'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/pressiat-2.mp4',       poster: 'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/pressiat-2-thumbnail.webp', label: 'Pressiat — Event' },
      { src: 'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/domestique-1.mp4',     poster: 'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/domestique-1-thumbnail.webp', label: 'Domestique — Commercial' },
      { src: 'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/domestique-2.mp4',     poster: 'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/domestique-2-thumbnail.webp', label: 'Domestique — Brand' },
      { src: 'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/pump-fun.mp4',              poster: 'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/pump-fun-thumbnail.webp',      label: 'Pump Fun — Web3' },
    ];

    // ---- Layout config ----
    const CARD_W     = 360;
    const CARD_H     = 260;
    const ROTATE_Y   = 84;   // all cards same angle — ~10% face visible
    const SPACING    = 70;   // px between each card's pivot edge
    const COUNT      = 5;    // cards per side
    const INNER_GAP  = 280;  // px from center to first card's pivot

    const hero = document.getElementById('hero');

    function createCard({ src, poster, label }, x, y, ry, origin, z, delay) {
      const card = document.createElement('div');
      card.className = 'card';
      card.setAttribute('role', 'img');
      card.setAttribute('aria-label', label);
      card.style.left = x + 'px';
      card.style.top  = y + 'px';
      card.style.zIndex = z;
      card.style.transformOrigin = origin;

      const baseTransform = 'rotateY(' + ry + 'deg)';
      card.style.transform = baseTransform;

      // Video — preload none, poster for instant first paint
      const vid = document.createElement('video');
      vid.src = src;
      vid.poster = poster;
      vid.preload = 'none';
      vid.muted = true;
      vid.loop = true;
      vid.playsInline = true;
      vid.setAttribute('playsinline', '');
      card.appendChild(vid);

      // Start playback only when the card enters the viewport
      const io = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting) {
          vid.play().catch(() => {});
          io.disconnect();
        }
      }, { threshold: 0.1 });
      io.observe(card);

      // Hover interaction: pop out face-on, lift up
      card.addEventListener('mouseenter', () => {
        card.style.zIndex = 50;
        card.style.transform = 'rotateY(0deg) translateY(-60px) scale(1.05)';
      });
      card.addEventListener('mouseleave', () => {
        card.style.zIndex = z;
        card.style.transform = baseTransform;
      });

      // Staggered entrance
      card.style.opacity = '0';
      requestAnimationFrame(() => {
        setTimeout(() => {
          card.style.opacity = '1';
          card.style.transition = 'transform 0.5s cubic-bezier(0.23,1,0.32,1), opacity 0.5s ease';
        }, delay);
      });

      hero.appendChild(card);
    }

    // Wait for layout to stabilize before reading dimensions
    requestAnimationFrame(() => {
      const vw = window.innerWidth;
      const cx = vw / 2;
      const cy = hero.offsetHeight * 0.46;
      const topY = cy - CARD_H / 2;

      // LEFT fan — pivot on right edge, cards spread leftward
      for (let i = 0; i < COUNT; i++) {
        const anchor = cx - INNER_GAP - i * SPACING;
        createCard(VIDEOS[i], anchor - CARD_W, topY, ROTATE_Y, 'right center', COUNT - i, 120 + i * 70);
      }

      // RIGHT fan — mirror, pivot on left edge
      for (let i = 0; i < COUNT; i++) {
        const anchor = cx + INNER_GAP + i * SPACING;
        createCard(VIDEOS[COUNT + i], anchor, topY, -ROTATE_Y, 'left center', COUNT - i, 120 + i * 70);
      }
    });
  </script>
</body>
</html>

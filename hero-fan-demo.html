<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hero Fan — BuildLore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800;900&display=swap" media="print" onload="this.media='all'" />
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      html,body{font-family:'Inter',system-ui,sans-serif;background:#fff;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
      .nav{display:flex;justify-content:space-between;padding:20px 48px;font-weight:700;font-size:18px}
      .nav a{text-decoration:none;color:#000}

      .hero{
        position:relative;
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        min-height:85vh;
        padding:40px 20px;
        overflow:visible;
      }
      .hero h1{
        position:relative;z-index:20;
        font-weight:900;
        font-size:clamp(3rem,7.5vw,7.5rem);
        letter-spacing:-0.045em;
        line-height:0.95;
        text-align:center;
        color:#000;
      }
      .hero .sub{
        position:relative;z-index:20;
        margin-top:24px;
        font-size:16px;font-weight:400;color:#555;
        text-align:center;letter-spacing:-0.01em;
      }

      /* Each card is positioned absolutely inside .hero */
      .card{
        position:absolute;
        border-radius:6px;
        overflow:hidden;
        cursor:pointer;
        transition:box-shadow .3s,filter .3s;
      }
      .card:hover{
        box-shadow:0 25px 70px rgba(0,0,0,.3)!important;
        filter:brightness(1.08);
      }
      .card video{
        width:100%;height:100%;
        object-fit:cover;display:block;
        pointer-events:none;
      }
      .card .overlay{
        position:absolute;inset:0;
        pointer-events:none;border-radius:6px;
      }

      @media(max-width:1024px){.card{display:none}}
    </style>
  </head>
  <body>
    <nav class="nav"><span>BuildLore</span><a href="#">Work</a></nav>
    <section class="hero" id="hero">
      <h1>Retain attention.<br>Build brand.</h1>
      <p class="sub">Narrative-led branding, video production, and content for tech & Web3.</p>
    </section>

    <script>
      var VIDEOS=[
        'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/fantasy-1.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/H-company-1.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/projection/pressiat.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/eterna.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/H-company-2.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/fantasy-2.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/domestique-1.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/domestique-2.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/pump-fun.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/fantasy-3.mp4',
      ];

      var hero=document.getElementById('hero');
      var vw=window.innerWidth;
      var vh=hero.offsetHeight;
      var cx=vw/2; // center x

      // Reference image analysis:
      // - Card 0 (closest to text): large, light, barely rotated, ~30% from center
      // - Card 4 (edge): small, dark, heavily rotated, at viewport edge
      // Left cards go from center-left outward to left edge
      // Right cards mirror

      function makeCard(videoUrl,x,y,w,h,rotY,darkness,z,delay){
        var card=document.createElement('div');
        card.className='card';
        card.style.width=w+'px';
        card.style.height=h+'px';
        card.style.left=x+'px';
        card.style.top=y+'px';
        card.style.transform='perspective(1200px) rotateY('+rotY+'deg)';
        card.style.transformOrigin=rotY>0?'left center':'right center';
        card.style.zIndex=z;
        card.style.boxShadow='0 10px 40px rgba(0,0,0,'+(0.08+darkness*0.2)+')';

        var vid=document.createElement('video');
        vid.src=videoUrl;
        vid.muted=true;vid.loop=true;vid.playsInline=true;vid.autoplay=true;
        vid.setAttribute('playsinline','');
        card.appendChild(vid);

        if(darkness>0.02){
          var ov=document.createElement('div');
          ov.className='overlay';
          ov.style.background='rgba(0,0,0,'+darkness+')';
          card.appendChild(ov);
        }

        card.style.opacity='0';
        setTimeout(function(){
          card.style.transition='opacity .7s ease';
          card.style.opacity='1';
        },delay);

        hero.appendChild(card);
      }

      // Card dimensions & positions — tuned to match the ref
      // Index 0 = closest to center, 4 = at viewport edge
      var centerY=vh/2;

      // LEFT SIDE (5 cards) — cards fan left, rotateY positive (turning left face toward viewer)
      for(var i=0;i<5;i++){
        var t=i/4;
        var w=280-t*130;   // 280 → 150
        var h=380-t*140;   // 380 → 240
        // x: start near center (~35% from left), spread to left edge
        var x=cx-320-i*110;
        var y=centerY-h/2-10+t*20;
        var ry=5+t*55;     // 5° → 60°
        var dark=t*0.5;    // 0 → 0.5
        var z=10-i;
        makeCard(VIDEOS[i],x,y,w,h,ry,dark,z,200+i*100);
      }

      // RIGHT SIDE (5 cards) — mirror
      for(var i=0;i<5;i++){
        var t=i/4;
        var w=280-t*130;
        var h=380-t*140;
        var x=cx+320-w+i*110;
        var y=centerY-h/2-10+t*20;
        var ry=-(5+t*55);
        var dark=t*0.5;
        var z=10-i;
        makeCard(VIDEOS[5+i],x,y,w,h,ry,dark,z,200+i*100);
      }
    </script>
  </body>
</html>

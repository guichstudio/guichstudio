<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hero Fan — BuildLore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800;900&display=swap" media="print" onload="this.media='all'" />
    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      html,body{font-family:'Inter',system-ui,sans-serif;background:#fff;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
      .nav{display:flex;justify-content:space-between;padding:20px 48px;font-weight:700;font-size:18px}
      .nav a{text-decoration:none;color:#000}

      .hero{
        position:relative;
        display:flex;flex-direction:column;
        align-items:center;justify-content:center;
        min-height:85vh;
        padding:40px 20px;
      }
      .hero h1{
        position:relative;z-index:20;
        font-weight:900;
        font-size:clamp(3rem,7.5vw,7.5rem);
        letter-spacing:-0.045em;line-height:0.95;
        text-align:center;color:#000;
      }
      .hero .sub{
        position:relative;z-index:20;
        margin-top:24px;font-size:16px;font-weight:400;
        color:#555;text-align:center;
      }

      /* Fan wrapper — holds the 5 cards on each side, applies the
         gradient mask so cards blend to white at both ends. */
      .fan-wrap{
        position:absolute;
        top:50%;
        height:420px;
        transform:translateY(-50%);
        pointer-events:none;
        perspective:1200px;
      }
      .fan-wrap.left{
        left:0;
        /* fade: left edge (outer) → solid → right edge (near text) */
        -webkit-mask-image:linear-gradient(to right,transparent 0%,black 12%,black 55%,transparent 100%);
        mask-image:linear-gradient(to right,transparent 0%,black 12%,black 55%,transparent 100%);
      }
      .fan-wrap.right{
        right:0;
        -webkit-mask-image:linear-gradient(to left,transparent 0%,black 12%,black 55%,transparent 100%);
        mask-image:linear-gradient(to left,transparent 0%,black 12%,black 55%,transparent 100%);
      }

      .card{
        position:absolute;
        border-radius:5px;
        overflow:hidden;
        cursor:pointer;
        pointer-events:auto;
        transform-style:preserve-3d;
        transition:box-shadow .3s,filter .3s;
      }
      .card:hover{
        box-shadow:0 20px 60px rgba(0,0,0,.3)!important;
        filter:brightness(1.08);
      }
      .card video{
        width:100%;height:100%;
        object-fit:cover;display:block;
        pointer-events:none;
      }
      .card .ov{
        position:absolute;inset:0;
        pointer-events:none;border-radius:5px;
      }

      @media(max-width:1024px){.fan-wrap{display:none}}
    </style>
  </head>
  <body>
    <nav class="nav"><span>BuildLore</span><a href="#">Work</a></nav>
    <section class="hero" id="hero">
      <div class="fan-wrap left" id="fan-left"></div>
      <div class="fan-wrap right" id="fan-right"></div>
      <h1>Retain attention.<br>Build brand.</h1>
      <p class="sub">Narrative-led branding, video production, and content for tech & Web3.</p>
    </section>

    <script>
      var VIDEOS=[
        'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/fantasy-1.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/H-company-1.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/projection/pressiat.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/eterna.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/H-company-2.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/fantasy-2.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/domestique-1.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/commercial/domestique-2.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/pump-fun.mp4',
        'https://d8clex4mautkm.cloudfront.net/video-landing/web-3/fantasy-3.mp4',
      ];

      var vw = window.innerWidth;
      // Fan wrapper width: from viewport edge to ~40% from center
      var fanW = Math.round(vw * 0.42);
      document.getElementById('fan-left').style.width = fanW + 'px';
      document.getElementById('fan-right').style.width = fanW + 'px';

      function buildFan(container, side, videos) {
        var count = videos.length;
        var flip = side === 'right' ? -1 : 1;
        var wrapW = container.offsetWidth || fanW;
        var wrapH = 420;

        for (var i = 0; i < count; i++) {
          var t = i / (count - 1 || 1); // 0 → 1

          // 16:9 cards — largest closest to center, smallest at edge
          var cardW = Math.round(320 - t * 160);  // 320 → 160
          var cardH = Math.round(cardW * 9 / 16);  // 16:9

          // Position inside wrapper: card 0 at inner edge, card 4 at outer edge
          // For left: inner = right side of wrapper, outer = left side
          var spacing = (wrapW - cardW * 0.3) / (count - 1); // tight overlap
          var x;
          if (side === 'left') {
            // Card 0 at right of wrapper (near center), card 4 at left (edge)
            x = wrapW - cardW - i * spacing;
          } else {
            x = i * spacing;
          }
          var y = (wrapH - cardH) / 2 + t * 15; // slight vertical drift

          // Rotation: more at the edges
          var ry = (5 + t * 55) * flip;

          // Dark overlay increases toward edges
          var dark = t * 0.5;

          var card = document.createElement('div');
          card.className = 'card';
          card.style.width = cardW + 'px';
          card.style.height = cardH + 'px';
          card.style.left = x + 'px';
          card.style.top = y + 'px';
          card.style.transform = 'rotateY(' + ry + 'deg)';
          card.style.transformOrigin = side === 'left' ? 'right center' : 'left center';
          card.style.zIndex = count - i;
          card.style.boxShadow = '0 8px 30px rgba(0,0,0,' + (0.06 + t * 0.15) + ')';

          var vid = document.createElement('video');
          vid.src = videos[i];
          vid.muted = true; vid.loop = true; vid.playsInline = true; vid.autoplay = true;
          vid.setAttribute('playsinline', '');
          card.appendChild(vid);

          if (dark > 0.02) {
            var ov = document.createElement('div');
            ov.className = 'ov';
            ov.style.background = 'rgba(0,0,0,' + dark + ')';
            card.appendChild(ov);
          }

          card.style.opacity = '0';
          (function(c, d) {
            setTimeout(function() {
              c.style.transition = 'opacity .6s ease';
              c.style.opacity = '1';
            }, d);
          })(card, 200 + i * 100);

          container.appendChild(card);
        }
      }

      buildFan(document.getElementById('fan-left'), 'left', VIDEOS.slice(0, 5));
      buildFan(document.getElementById('fan-right'), 'right', VIDEOS.slice(5, 10));
    </script>
  </body>
</html>

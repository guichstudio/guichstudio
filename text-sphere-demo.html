<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3D Text Sphere — BuildLore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-blocking font load so the sphere renders even if Google Fonts is slow -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap"
    /></noscript>
    <style>
      :root {
        --bg: #f3f3f3;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 16px;
        overflow-x: hidden;
      }
      .stage {
        position: relative;
        margin: 0 auto;
        user-select: none;
        -webkit-user-select: none;
      }
      .sphere {
        position: absolute;
        left: 50%;
        top: 50%;
        border-radius: 50%;
        background: radial-gradient(
          circle at 35% 28%,
          #ffffff 0%,
          #fafafa 35%,
          #eaeaea 70%,
          #cfcfcf 100%
        );
        box-shadow:
          0 30px 80px rgba(0, 0, 0, 0.18),
          inset -20px -35px 70px rgba(0, 0, 0, 0.08),
          inset 15px 20px 40px rgba(255, 255, 255, 0.65);
      }
      .text-stage {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 0;
        height: 0;
        transform-style: preserve-3d;
        will-change: transform;
      }
      .line {
        position: absolute;
        left: 0;
        top: 0;
        transform-style: preserve-3d;
      }
      .char {
        position: absolute;
        left: 0;
        top: 0;
        font-family: 'Inter', sans-serif;
        font-weight: 800;
        color: #0a0a0a;
        letter-spacing: -0.01em;
        transform-origin: 0 0 0;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        white-space: pre;
      }
      .hint {
        margin-top: 40px;
        color: #888;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <div id="stage" class="stage" role="img" aria-label="Rotating text sphere"></div>
    <p class="hint">Drag your finger or move your cursor to tilt.</p>

    <script>
      const MISSION_LINES = [
        'Visual experience studio for brands, founders and product leaders in Web3 and live events.',
        'We move fast, work with full autonomy, and deliver high-quality brands and products that stay ahead.',
        'Enhanced by deep Web3 expertise, applied AI, and structured yet flexible processes.',
        'From installations and projection mapping to films and creative direction, anywhere in the world.',
      ];
      const RADIUS = 260;
      const FONT_SIZE = 18;
      const SPIN = 18; // deg / second
      const TILT_X_BASE = -8;
      const TILT_Z = -12;
      const LINE_HEIGHT = Math.round(FONT_SIZE * 1.9);
      const SPHERE_SIZE = RADIUS * 2;
      const BOX_SIZE = Math.round(RADIUS * 2.8);

      const stage = document.getElementById('stage');
      stage.style.width = BOX_SIZE + 'px';
      stage.style.height = BOX_SIZE + 'px';
      stage.style.perspective = RADIUS * 5 + 'px';

      // Sphere
      const sphere = document.createElement('div');
      sphere.className = 'sphere';
      sphere.style.width = SPHERE_SIZE + 'px';
      sphere.style.height = SPHERE_SIZE + 'px';
      sphere.style.marginLeft = -RADIUS + 'px';
      sphere.style.marginTop = -RADIUS + 'px';
      stage.appendChild(sphere);

      // Text stage
      const textStage = document.createElement('div');
      textStage.className = 'text-stage';
      stage.appendChild(textStage);

      // Build each line — each wraps a full 360° so it becomes a continuous
      // marquee as the sphere rotates.
      MISSION_LINES.forEach((line, li) => {
        const lineEl = document.createElement('div');
        lineEl.className = 'line';
        const y = (li - (MISSION_LINES.length - 1) / 2) * LINE_HEIGHT;
        const n = line.length;
        for (let i = 0; i < n; i++) {
          const angle = (i / n) * 360;
          const ch = line[i] === ' ' ? '\u00A0' : line[i];
          const span = document.createElement('span');
          span.className = 'char';
          span.textContent = ch;
          span.style.fontSize = FONT_SIZE + 'px';
          span.style.transform =
            'translate(-50%, -50%) translateY(' +
            y +
            'px) rotateY(' +
            angle +
            'deg) translateZ(' +
            RADIUS +
            'px)';
          lineEl.appendChild(span);
        }
        textStage.appendChild(lineEl);
      });

      // Input: mouse + touch → user offsets layered over the auto-spin.
      let userTargetX = TILT_X_BASE;
      let userTargetYOff = 0;
      let userCurX = TILT_X_BASE;
      let userCurYOff = 0;
      let baseY = 0;
      let lastTs = null;

      function updateTarget(clientX, clientY) {
        const rect = stage.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = (clientX - cx) / (window.innerWidth / 2);
        const dy = (clientY - cy) / (window.innerHeight / 2);
        userTargetX = TILT_X_BASE - dy * 25;
        userTargetYOff = dx * 50;
      }

      window.addEventListener('mousemove', (e) =>
        updateTarget(e.clientX, e.clientY),
      );
      const onTouch = (e) => {
        if (!e.touches || e.touches.length === 0) return;
        updateTarget(e.touches[0].clientX, e.touches[0].clientY);
      };
      window.addEventListener('touchstart', onTouch, { passive: true });
      window.addEventListener('touchmove', onTouch, { passive: true });

      function loop(ts) {
        if (lastTs === null) lastTs = ts;
        const dt = Math.min(0.05, (ts - lastTs) / 1000);
        lastTs = ts;

        baseY = (baseY + SPIN * dt) % 360;

        const ease = 0.08;
        userCurX += (userTargetX - userCurX) * ease;
        userCurYOff += (userTargetYOff - userCurYOff) * ease;

        textStage.style.transform =
          'rotateX(' +
          userCurX +
          'deg) rotateY(' +
          (baseY + userCurYOff) +
          'deg) rotateZ(' +
          TILT_Z +
          'deg)';
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    </script>
  </body>
</html>

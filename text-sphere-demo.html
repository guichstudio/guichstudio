<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>3D Text Sphere — BuildLore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-blocking font load so the sphere renders even if Google Fonts is slow -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap"
    /></noscript>
    <style>
      :root {
        --bg: #dadada;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 16px;
        overflow-x: hidden;
        overscroll-behavior: none;
      }
      .stage {
        position: relative;
        margin: 0 auto;
        user-select: none;
        -webkit-user-select: none;
        /* Stop the mobile browser from stealing touches for page scroll. */
        touch-action: none;
        cursor: grab;
      }
      .stage:active {
        cursor: grabbing;
      }
      .sphere {
        position: absolute;
        left: 50%;
        top: 50%;
        border-radius: 50%;
        pointer-events: none;
        background-image: url('https://raw.githubusercontent.com/guichstudio/guichstudio/claude/3d-text-sphere-yWKJ9/landing/public/sphere-texture.jpg');
        /* Zoom past the dark falloff at the edge of the photo so the
           circular clip doesn't read as a stroke. */
        background-size: 118% 118%;
        background-position: center;
        background-color: #1a1a1a;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
      }
      .text-stage {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 0;
        height: 0;
        transform-style: preserve-3d;
        will-change: transform;
        pointer-events: none;
      }
      .line {
        position: absolute;
        left: 0;
        top: 0;
        transform-style: preserve-3d;
      }
      .char {
        position: absolute;
        left: 0;
        top: 0;
        display: inline-block;
        font-family: 'Inter', sans-serif;
        font-weight: 800;
        color: #ffffff;
        text-shadow:
          0 1px 3px rgba(0, 0, 0, 0.75),
          0 0 4px rgba(0, 0, 0, 0.55);
        line-height: 1;
        height: 1em;
        padding: 0;
        margin: 0;
        letter-spacing: 0;
        transform-origin: 0 0 0;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        white-space: pre;
      }
      .hint {
        margin-top: 40px;
        color: #666;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <div id="stage" class="stage" role="img" aria-label="Rotating text sphere"></div>
    <p class="hint">Drag the sphere left / right to spin it.</p>

    <script>
      const MISSION_LINES = [
        'Visual experience studio for brands, founders and product leaders in Web3 and live events.',
        'We move fast, work with full autonomy, and deliver high-quality brands and products that stay ahead.',
        'Enhanced by deep Web3 expertise, applied AI, and structured yet flexible processes.',
        'From installations and projection mapping to films and creative direction, anywhere in the world.',
      ];

      // Responsive sizing — the sphere always fits on screen and stays
      // centered. Everything else (font, line-height, box) scales from it.
      const MAX_RADIUS = 260;
      const MAX_FONT_SIZE = 32;
      const BOX_TO_R = 2.4;
      const viewportW = window.innerWidth;
      const scale = Math.min(1, (viewportW * 0.92) / (MAX_RADIUS * BOX_TO_R));
      const RADIUS = Math.max(80, Math.round(MAX_RADIUS * scale));
      const FONT_SIZE = Math.max(12, Math.round(MAX_FONT_SIZE * scale));
      // Negative = left-to-right scroll of the text around the sphere.
      const SPIN = -14;
      const TILT_X = -12;
      const TILT_Z = -8;
      const LINE_HEIGHT = Math.round(FONT_SIZE * 1.2);
      const SPHERE_SIZE = RADIUS * 2;
      const BOX_SIZE = Math.round(RADIUS * BOX_TO_R);
      const DEG_PER_CHAR_FALLBACK =
        ((FONT_SIZE * 0.42) / RADIUS) * (180 / Math.PI);

      const stage = document.getElementById('stage');
      stage.style.width = BOX_SIZE + 'px';
      stage.style.height = BOX_SIZE + 'px';
      stage.style.perspective = RADIUS * 5 + 'px';

      // White sphere — pure CSS radial-gradient, no SVG texture.
      const sphere = document.createElement('div');
      sphere.className = 'sphere';
      sphere.style.width = SPHERE_SIZE + 'px';
      sphere.style.height = SPHERE_SIZE + 'px';
      sphere.style.marginLeft = -RADIUS + 'px';
      sphere.style.marginTop = -RADIUS + 'px';
      stage.appendChild(sphere);

      // Text stage
      const textStage = document.createElement('div');
      textStage.className = 'text-stage';
      stage.appendChild(textStage);

      // DOM-based char width measurement. Hidden inline-block spans with the
      // exact same CSS as the final render guarantee that getBoundingClientRect
      // widths match the rendered glyphs, regardless of which font is active.
      function measureDOM() {
        const container = document.createElement('div');
        container.setAttribute('aria-hidden', 'true');
        container.style.cssText = [
          'visibility:hidden',
          'position:absolute',
          'pointer-events:none',
          'top:-99999px',
          'left:0',
          "font-family:'Inter',ui-sans-serif,system-ui,sans-serif",
          'font-weight:800',
          'font-size:' + FONT_SIZE + 'px',
          'line-height:1',
          'letter-spacing:0',
          'font-kerning:none',
          'white-space:nowrap',
        ].join(';');
        document.body.appendChild(container);

        const perLineSpans = MISSION_LINES.map((line) => {
          const lineDiv = document.createElement('div');
          lineDiv.style.whiteSpace = 'nowrap';
          const spans = [];
          for (let i = 0; i < line.length; i++) {
            const ch = line[i] === ' ' ? '\u00A0' : line[i];
            const s = document.createElement('span');
            s.style.cssText =
              'display:inline-block;padding:0;margin:0;line-height:1;height:1em;letter-spacing:0;white-space:pre';
            s.textContent = ch;
            lineDiv.appendChild(s);
            spans.push(s);
          }
          container.appendChild(lineDiv);
          return spans;
        });

        void container.offsetHeight;

        const widths = perLineSpans.map((spans) =>
          spans.map((s) => Math.max(1, s.getBoundingClientRect().width)),
        );

        document.body.removeChild(container);
        return widths;
      }

      function computeAngles() {
        const widths = measureDOM();
        // Each line is scaled to fill exactly 360° of arc so there is no
        // visible gap at the seam — the first and last chars meet exactly
        // at the back of the sphere. Letter spacing adjusts per-line:
        // shorter lines stretch, longer lines compress.
        return widths.map((lineWidths) => {
          const total = lineWidths.reduce((a, b) => a + b, 0) || 1;
          const out = [];
          let cursor = 0;
          for (let i = 0; i < lineWidths.length; i++) {
            const centerPx = cursor + lineWidths[i] / 2;
            cursor += lineWidths[i];
            out.push((centerPx / total) * 360 - 180);
          }
          return out;
        });
      }

      function buildText(charAngles) {
        while (textStage.firstChild)
          textStage.removeChild(textStage.firstChild);
        MISSION_LINES.forEach((line, li) => {
          const lineEl = document.createElement('div');
          lineEl.className = 'line';
          const y = (li - (MISSION_LINES.length - 1) / 2) * LINE_HEIGHT;
          const angles = charAngles[li];
          for (let i = 0; i < line.length; i++) {
            const angle = angles[i];
            const ch = line[i] === ' ' ? '\u00A0' : line[i];
            const span = document.createElement('span');
            span.className = 'char';
            span.textContent = ch;
            span.style.fontSize = FONT_SIZE + 'px';
            // translate(-50%, -50%) MUST be last so it's applied FIRST,
            // in the glyph's local frame before rotation. Any other order
            // offsets each char by its own width and creates a visible
            // stagger along the curve.
            span.style.transform =
              'translateY(' +
              y +
              'px) rotateY(' +
              angle +
              'deg) translateZ(' +
              RADIUS +
              'px) translate(-50%, -50%)';
            lineEl.appendChild(span);
          }
          textStage.appendChild(lineEl);
        });
      }

      // Initial render with a uniform fallback step so something shows up
      // immediately, before font has loaded.
      const uniformFallback = MISSION_LINES.map((line) => {
        const n = line.length;
        return Array.from(
          { length: n },
          (_, i) => (i - (n - 1) / 2) * DEG_PER_CHAR_FALLBACK,
        );
      });
      buildText(uniformFallback);

      // Once Inter is loaded, re-measure and rebuild.
      const fontSpec = '800 ' + FONT_SIZE + 'px Inter';
      const delay = (ms) => new Promise((r) => setTimeout(r, ms));
      (async function () {
        if (document.fonts && document.fonts.load) {
          try {
            await Promise.race([document.fonts.load(fontSpec), delay(2000)]);
          } catch (e) {}
        }
        await delay(50);
        buildText(computeAngles());
        await delay(500);
        buildText(computeAngles());
      })();

      // Drag-based interaction using pointer events, locked to the stage.
      let baseY = 0;
      let liveY = 0;
      let displayY = 0;
      let dragging = false;
      let activePointer = null;
      let dragStartX = 0;
      let lastTs = null;
      const PX_TO_DEG = 0.5;

      stage.addEventListener('pointerdown', (e) => {
        if (dragging) return;
        dragging = true;
        activePointer = e.pointerId;
        dragStartX = e.clientX;
        liveY = 0;
        try {
          stage.setPointerCapture(e.pointerId);
        } catch (err) {}
      });
      stage.addEventListener('pointermove', (e) => {
        if (!dragging || e.pointerId !== activePointer) return;
        liveY = (e.clientX - dragStartX) * PX_TO_DEG;
      });
      const endDrag = (e) => {
        if (!dragging || e.pointerId !== activePointer) return;
        dragging = false;
        activePointer = null;
        baseY += liveY;
        liveY = 0;
        try {
          stage.releasePointerCapture(e.pointerId);
        } catch (err) {}
      };
      stage.addEventListener('pointerup', endDrag);
      stage.addEventListener('pointercancel', endDrag);
      stage.addEventListener('lostpointercapture', endDrag);

      function loop(ts) {
        if (lastTs === null) lastTs = ts;
        const dt = Math.min(0.05, (ts - lastTs) / 1000);
        lastTs = ts;

        if (!dragging && SPIN !== 0) {
          baseY = (baseY + SPIN * dt) % 360;
        }
        const target = baseY + liveY;
        const ease = dragging ? 0.35 : 0.18;
        displayY += (target - displayY) * ease;

        textStage.style.transform =
          'rotateX(' +
          TILT_X +
          'deg) rotateY(' +
          displayY +
          'deg) rotateZ(' +
          TILT_Z +
          'deg)';
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
